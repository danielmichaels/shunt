version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: ./cmd/shunt
    binary: shunt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers_v2:
  - dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/danielmichaels/shunt"
    tags:
      - "v{{ .Version }}"
      - "v{{ .Major }}.{{ .Minor }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.source": "https://github.com/danielmichaels/shunt"
      "org.opencontainers.image.version": "{{ .Version }}"

release:
  github:
    owner: danielmichaels
    name: shunt
  draft: false
  prerelease: auto