version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: ./cmd/shunt
    binary: shunt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/danielmichaels/shunt"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    goarch: amd64
  - use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/danielmichaels/shunt"
      - "--label=org.opencontainers.image.version={{ .Version }}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/danielmichaels/shunt:v{{ .Version }}"
    image_templates:
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-amd64"
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-arm64"
  - name_template: "ghcr.io/danielmichaels/shunt:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-amd64"
      - "ghcr.io/danielmichaels/shunt:v{{ .Version }}-arm64"

release:
  github:
    owner: danielmichaels
    name: shunt
  draft: true
  prerelease: auto