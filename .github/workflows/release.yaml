name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Verify CHANGELOG.md is up to date
        run: |
          git cliff -o /tmp/changelog-check.md
          diff -u CHANGELOG.md /tmp/changelog-check.md || {
            echo "::error::CHANGELOG.md is out of date. Run 'task changelog' and commit before tagging."
            exit 1
          }

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=/tmp/goreleaser-changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}