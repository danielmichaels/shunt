name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "Taskfile.docs.yml"
      - ".github/workflows/docs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "Taskfile.docs.yml"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site (strict)
        run: task docs:check

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
