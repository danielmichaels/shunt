site_name: Shunt
site_description: A high-performance, rule-based message router built on NATS
site_url: https://shunt.danielms.site/
site_author: Daniel Michaels

repo_name: danielmichaels/shunt
repo_url: https://github.com/danielmichaels/shunt
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/danielmichaels/shunt

nav:
  - Home: index.md
  - Getting Started:
      - Local Testing Tutorial: 09-local-testing-tutorial.md
      - KV Lifecycle Tour: 10-kv-lifecycle.md
  - Concepts:
      - Core Concepts: 01-core-concepts.md
      - System Variables: 02-system-variables.md
      - Array Processing: 03-array-processing.md
      - Primitive Messages: 04-primitive-messages.md
      - KV Enrichment: 08-kv-enrichment.md
  - Operations:
      - Configuration: 07-configuration.md
      - Security: 05-security.md
      - Deployment: 06-deployment.md
