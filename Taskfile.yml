version: "3"

vars:
  BIN_DIR: ./bin
  LDFLAGS: -s -w

env:
  SHUNT_LOG_LEVEL: info
  SHUNT_LOG_ENCODING: console
  SHUNT_NATS_URL: "nats://host.docker.internal:4442"
  SHUNT_CONFIG: ./shunt.local.yaml

silent: true

tasks:
  default:
    silent: true
    cmds:
      - task --list

  build:
    desc: Build all binaries
    deps:
      - build:shunt

  build:shunt:
    desc: Build shunt binary
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/shunt ./cmd/shunt
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - config/**/*.go
      - go.mod
    generates:
      - "{{.BIN_DIR}}/shunt"

  test:
    desc: Run all tests
    cmds:
      - go test ./... {{.CLI_ARGS}}

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./... {{.CLI_ARGS}}

  test:cover:
    desc: Run tests with HTML coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./... {{.CLI_ARGS}}

  fmt:
    desc: Format code and tidy modules
    cmds:
      - gofmt -w .
      - go mod tidy

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t shunt .

  shunt:
    desc: Build and run shunt
    deps:
      - build:shunt
    cmds:
      - ./bin/shunt {{.CLI_ARGS}}

  dev:
    desc: Run shunt with hot-reloading (air)
    cmds:
      - air

  nats:
    desc: Run NATS cli
    env:
      NATS_URL: "{{.SHUNT_NATS_URL}}"
    cmds:
      - nats {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}} coverage.out coverage.html

  changelog:
    desc: "Generate full changelog"
    cmds:
      - git cliff -o CHANGELOG.md 
    sources:
      - .git/refs/tags/*

  changelog:unreleased:
    desc: "Preview changelog for next release (unreleased commits)"
    cmds:
      - git cliff --unreleased

  changelog:range:
    desc: "Generate changelog between two tags (FROM=v0.0.1 TO=v0.0.2)"
    requires:
      vars: [FROM, TO]
    cmds:
      - git cliff {{.FROM}}..{{.TO}}

  changelog:since:
    desc: "Generate changelog since a specific tag to HEAD"
    requires:
      vars: [FROM]
    cmds:
      - git cliff {{.FROM}}..HEAD

  release:tag:
    desc: "Tag a release and regenerate the full changelog"
    requires:
      vars: [TAG]
    preconditions:
      - sh: git diff --quiet
        msg: "Working directory is dirty. Commit or stash changes first."
      - sh: git diff --cached --quiet
        msg: "Staged changes exist. Commit or stash first."
    cmds:
      - git cliff -o CHANGELOG.md --tag {{.TAG}}
      - git add CHANGELOG.md
      - 'git commit -m "chore(release): update changelog for {{.TAG}}"'
      - 'git tag -a {{.TAG}} -m "Release {{.TAG}}"'
      - 'echo "Tagged {{.TAG}}. Push with ''git push origin main --tags'' to trigger goreleaser."'

  release:dry:
    desc: "Dry-run goreleaser to validate config"
    cmds:
      - goreleaser release --snapshot --clean --skip publish --release-notes=/tmp/goreleaser-changelog.md
