# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/danielmichaels/shunt
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
          {% if commit.breaking %} (**BREAKING**){% endif %}\
          ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}
"""
trim = true
footer = ""
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/danielmichaels/shunt" },
]

[git]
conventional_commits = true
filter_unconventional = false  # KEY: don't drop non-conventional commits
commit_parsers = [
  # Skip noise
  { message = "^Merge pull request", skip = true },
  { message = "^Merge branch", skip = true },
  { message = "^formatting", skip = true },
  { message = "^init$", skip = true },

  # Conventional commit types
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactor" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^ci", group = "🔧 CI" },
  { message = "^chore", group = "⚙️ Miscellaneous" },

  # Catch-all: non-conventional commits that aren't skipped land here.
  # This captures your older commits like "Add stream refresh capability..."
  # Remove this once your history is fully conventional if you want strict mode.
  { message = ".*", group = "📦 Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
ignore_tags = "-(rc|beta|alpha)"
skip_tags = ""
topo_order = false
sort_commits = "newest"
protect_breaking_commits = false
