version: "3"

vars:
  MKDOCS_MATERIAL_VERSION: "9.5.49"
  # click>=8.3 breaks mkdocs livereload (mkdocs#4032). Pin until upstream resolves.
  CLICK_CONSTRAINT: "click<=8.2.1"
  UVX_RUN: >-
    uvx
    --with mkdocs-material=={{.MKDOCS_MATERIAL_VERSION}}
    --with '{{.CLICK_CONSTRAINT}}'

tasks:
  default:
    silent: true
    cmds:
      - task --list --taskfile Taskfile.docs.yml

  serve:
    desc: "Run docs site locally with live reload (http://127.0.0.1:8800)"
    vars:
      DOCS_PORT: '{{.DOCS_PORT | default "8800"}}'
    cmds:
      - "{{.UVX_RUN}} mkdocs serve --livereload --dev-addr 127.0.0.1:{{.DOCS_PORT}} {{.CLI_ARGS}}"

  build:
    desc: "Build static site into ./site"
    cmds:
      - "{{.UVX_RUN}} mkdocs build --strict {{.CLI_ARGS}}"

  clean:
    desc: "Remove built site"
    cmds:
      - rm -rf site

  check:
    desc: "Strict build — fails on warnings (broken links, missing files, etc.)"
    cmds:
      - "{{.UVX_RUN}} mkdocs build --strict --clean"

  deps:
    desc: "Pre-warm uvx cache for the pinned mkdocs-material version"
    cmds:
      - "{{.UVX_RUN}} mkdocs --version"

  tapes:
    desc: "Re-render all VHS tapes into docs/assets/casts/ (requires `brew install vhs`)"
    preconditions:
      - sh: "command -v vhs >/dev/null"
        msg: "vhs not found — install with `brew install vhs`"
      - sh: "test -x ./bin/shunt"
        msg: "./bin/shunt not built — run `task build:shunt` first"
    cmds:
      - mkdir -p docs/assets/casts
      - 'for t in tapes/*.tape; do echo ">>> $t" && vhs "$t"; done'

  tape:
    desc: "Re-render a single VHS tape: TAPE=tapes/foo.tape task docs:tape"
    requires:
      vars: [TAPE]
    preconditions:
      - sh: "command -v vhs >/dev/null"
        msg: "vhs not found — install with `brew install vhs`"
      - sh: "test -x ./bin/shunt"
        msg: "./bin/shunt not built — run `task build:shunt` first"
    cmds:
      - mkdir -p docs/assets/casts
      - vhs {{.TAPE}}
