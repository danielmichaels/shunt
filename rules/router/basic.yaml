# Basic rule with nested field access
# Sample message: {"sensor": {"id": "temp001", "reading": 32.5, "location": "bedroom"}}
- trigger:
    nats:
      subject: sensors.data
  conditions:
    operator: and
    items:
      - field: "{sensor.reading}"
        operator: gt
        value: 30
      - field: "{sensor.location}"
        operator: eq
        value: "bedroom"
  action:
    nats:
      subject: alerts.bedroom-temperature
      payload: |
        {
          "alert": "High bedroom temperature!",
          "sensor_id": {sensor.id},
          "reading": {sensor.reading},
          "location": {sensor.location},
          "timestamp": "{@timestamp()}",
          "alertId": "{@uuid7()}"
        }
