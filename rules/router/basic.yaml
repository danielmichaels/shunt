# Basic rule with nested field access
# The optional "name" field provides a human-readable label that appears as
# the "rule_name" label on Prometheus metrics (rule_matches_total, actions_total, etc).
# If omitted, the trigger subject or path is used as fallback.
# Sample message: {"sensor": {"id": "temp001", "reading": 32.5, "location": "bedroom"}}
- name: bedroom-temp-alert
  trigger:
    nats:
      subject: sensors.data
  conditions:
    operator: and
    items:
      - field: "{sensor.reading}"
        operator: gt
        value: 30
      - field: "{sensor.location}"
        operator: eq
        value: "bedroom"
  action:
    nats:
      subject: alerts.bedroom-temperature
      payload: |
        {
          "alert": "High bedroom temperature!",
          "sensor_id": {sensor.id},
          "reading": {sensor.reading},
          "location": {sensor.location},
          "timestamp": "{@timestamp()}",
          "alertId": "{@uuid7()}"
        }
